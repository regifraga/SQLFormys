<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLFormys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header Superior -->
    <header class="top-header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <span>SQLFormys</span>
        </div>
        <div class="header-actions">
            <!-- Espaço para futuras ações, ex: perfil -->
        </div>
    </header>

    <div class="app-container">
        <!-- Menu Lateral -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="menu-label">MENU</span>
                <button id="toggle-sidebar" class="icon-btn" aria-label="Recolher Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <nav class="sidebar-nav" id="project-accordion">
                <!-- Lista de Projetos e Módulos (Renderizado via JS) -->
                <div class="loading-state">Carregando projetos...</div>
            </nav>

            <div class="sidebar-footer">
                <span class="version-info">SQLFormys v1.0.0</span>
            </div>
        </aside>

        <!-- Área Principal de Conteúdo -->
        <main class="main-content">
            <div class="content-wrapper">
                <div id="form-container" class="card form-card hidden">
                    <div class="card-header">
                        <h2 id="form-title">Módulo</h2>
                        <span class="module-path" id="form-subtitle">Projeto > Módulo</span>
                    </div>
                    <div class="card-body">
                        <form id="dynamic-form">
                            <!-- Campos do formulário renderizados via JS -->
                        </form>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
                        <button type="button" class="btn btn-outline" id="btn-clear">Limpar</button>
                        <button type="button" class="btn btn-primary" id="btn-execute">Executar</button>
                    </div>
                </div>

                <!-- Container da Grid de Resultados -->
                <div id="grid-container" class="card grid-card hidden" style="margin-top: 24px;">
                    <div class="card-header">
                        <h2>Resultados</h2>
                    </div>
                    <div class="card-body" style="overflow-x: auto; padding: 0;">
                        <table class="data-table" id="result-table">
                            <thead id="result-thead"></thead>
                            <tbody id="result-tbody"></tbody>
                        </table>
                        <div id="grid-empty-state" class="hidden" style="padding: 24px; text-align: center; color: var(--text-secondary);">
                            Nenhum registro encontrado.
                        </div>
                    </div>
                </div>

                <div id="empty-state" class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    <h3>Selecione um Módulo</h3>
                    <p>Escolha um módulo no menu lateral para visualizar e preencher seu respectivo formulário.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Container para Toasts de Notificação -->
    <div id="toast-container" class="toast-container"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
